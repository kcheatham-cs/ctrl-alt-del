<!DOCTYPE html>
<html>
<head>
  <title>Instagram Rewind</title>
  <style>
    body {
      font-family: 'Times New Roman', Times, serif;
      text-align: center;
      background-color: black;
      color: white;
    }
    .box {
      background: #222;
      margin: 20px auto;
      padding: 20px;
      width: 60%;
      border-radius: 10px;
    }
    h1 { color: #ffcc00; margin-top: 30px; }
    h2 { margin-bottom: 10px; }

    .user-list { color: #ccc; line-height: 1.8; }
    .user-pill {
      display: inline-block;
      background: #333;
      padding: 4px 12px;
      border-radius: 20px;
      margin: 3px;
      font-size: 0.9rem;
    }
    .stat { font-size: 1.4rem; font-weight: bold; color: #ffcc00; }

    button {
      padding: 10px 20px;
      margin: 20px 8px;
      border: none;
      background-color: purple;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover { background-color: #5a009c; }
    #loading { color: #aaa; margin-top: 60px; }
  </style>
</head>
<body>

<h1>🎉 Your Instagram Rewind 🎉</h1>
<p id="loading">Loading rewind data...</p>

<div id="rewindContent" style="display:none">

  <div class="box">
    <h2>📊 Your Year in Numbers</h2>
    <p>Total followers: <span class="stat" id="totalFollowers">—</span></p>
    <p>Total post likes received: <span class="stat" id="totalPostLikes">—</span></p>
    <p>Total story views received: <span class="stat" id="totalStoryViews">—</span></p>
    <p>Total comments received: <span class="stat" id="totalComments">—</span></p>
  </div>

  <div class="box">
    <h2>🔥 Top Post Likers</h2>
    <div class="user-list" id="topPostLikers">—</div>
  </div>

  <div class="box">
    <h2>💬 Top Commenters</h2>
    <div class="user-list" id="topCommenters">—</div>
  </div>

  <div class="box">
    <h2>👀 Top Story Viewers</h2>
    <div class="user-list" id="topStoryViewers">—</div>
  </div>

  <div class="box">
    <h2>❤️ Top Story Likers</h2>
    <div class="user-list" id="topStoryLikers">—</div>
  </div>

</div>

<button onclick="goBack()">Back to Dashboard</button>

<script>
  const storedUser = JSON.parse(sessionStorage.getItem('user') || 'null');
  const userId = storedUser ? storedUser.id : 1;

  function renderUserList(users) {
    if (!users || users.length === 0) return '<span style="color:#666">No data yet</span>';
    return users.map(u => `<span class="user-pill">@${u.username} <small>(${u.count})</small></span>`).join('');
  }

  async function loadRewind() {
    try {
      const res  = await fetch(`/api/rewind/${userId}`);
      const data = await res.json();

      document.getElementById('loading').style.display    = 'none';
      document.getElementById('rewindContent').style.display = 'block';

      document.getElementById('totalFollowers').textContent  = data.totalFollowers;
      document.getElementById('totalPostLikes').textContent  = data.totalPostLikes;
      document.getElementById('totalStoryViews').textContent = data.totalStoryViews;
      document.getElementById('totalComments').textContent   = data.totalComments;

      document.getElementById('topPostLikers').innerHTML   = renderUserList(data.topPostLikers);
      document.getElementById('topCommenters').innerHTML   = renderUserList(data.topCommenters);
      document.getElementById('topStoryViewers').innerHTML = renderUserList(data.topStoryViewers);
      document.getElementById('topStoryLikers').innerHTML  = renderUserList(data.topStoryLikers);
    } catch (err) {
      document.getElementById('loading').textContent = 'Failed to load rewind data. Is the backend running?';
    }
  }

  function goBack() {
    window.location.href = '/dashboard.html';
  }

  loadRewind();
</script>

</body>
</html>
