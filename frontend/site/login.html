<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - KickRocks</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    :root{
            --purple: #833ab4;;
            --pink: #fd1d73;
            --orange: #ffc073;
            --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --ig-gradient-full:linear-gradient(135deg, #fcb045 0%, #dc2743 40%, #833ab4 80%, #405de6 100%);
        }
    
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a0a2e 0%, #2d1155 30%, #4a0e2e 60%, #1a0a2e 100%);
      background-attachment: scroll;
      min-height: 100vh;
    }
    .login-container {
      width: 100%;
      max-width: 350px;
      padding: 30px;
      border: 1px solid #eee;
      background-color:white;
      border-radius: 12px;
      text-align: center;
    }
    .logo { 
      font-size: 1.9rem; 
      font-weight: 600; 
      background: var(--ig-gradient-full);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px; 
    }
    .subtitle { font-size: 1.12rem; color: black; margin-bottom: 20px; }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    input:focus { outline: none; border-color: #6a0dad; }

    button {
      width: 100%;
      padding: 12px;
      background: #6a0dad;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      margin-top: 5px;
    }
    button:hover {  background: var(--ig-gradient-full); }
    button:disabled { background: #aaa; cursor: not-allowed; }

    .error { color: red; font-size: 0.85rem; margin-top: 10px; display: none; }
    .hint { font-size: 0.8rem; color: #999; margin-top: 16px; }
  </style>
</head>
<body>
<div class="login-container">
  <div class="logo">KickRocks</div>
  <div class="subtitle">Login to continue</div>

  <form onsubmit="login(event)">
    <input type="text" id="username" placeholder="Username" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit" id="submitBtn">Login</button>
  </form>

  <div class="error" id="errorMsg">Invalid username or password.</div>
  <div class="hint">Demo: username <strong>admin</strong> / password <strong>1234</strong></div>
</div>

<script>
  async function login(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');

    errorMsg.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Logging in...';

    try {
      const res  = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (data.success) {
        sessionStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard.html';
      } else {
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    } catch (err) {
      errorMsg.textContent = 'Could not reach server. Is the backend running?';
      errorMsg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Login';
    }
  }
</script>
</body>
</html>
