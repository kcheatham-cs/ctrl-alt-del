<!DOCTYPE html>
<html>
<head>
    <title>Rewind</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Inter",'Segoe UI', sans-serif;
        }

        :root{
            --purple: #833ab4;
            --pink: #fd1d73;
            --orange: #fcb045;

            --ig-gradient-full: linear-gradient(
                135deg,
                #fcb045 0%,
                #fd1d73 40%,
                #833ab4 80%
            );
        }

        body{
            background: linear-gradient(
                135deg,
                #1a0a2e 0%,
                #2d1155 40%,
                #4a0e2e 100%
            );
            color: white;
        }

        .container{
            padding: 3rem 5rem;
            max-width: 900px;
        }

        h1{
            font-size: 2.3rem;
            margin-bottom: 2rem;
        }

        .box{
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 1.3rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255,255,255,0.15);
            transition: 0.2s;
        }

        .box:hover{
            border-color: #fd1d73;
            box-shadow: 0 0 15px rgba(253,29,115,0.2);
        }

        .box h2{
            font-size: 1rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 0.3rem;
        }

        button{
            margin-top: 1.5rem;
            padding: 0.7rem 1.8rem;
            border-radius: 10px;
            border: none;
            background: var(--ig-gradient-full);
            color: white;
            cursor: pointer;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Rewind</h1>

    <div class="box">
        <h2>Top Post Likers</h2>
        <p>User456, User789, User321</p>
    </div>

    <div class="box">
        <h2>Top Commenters</h2>
        <p>User222, User888, User999</p>
    </div>

    <div class="box">
        <h2>Top Story Viewers</h2>
        <p>User111, User444, User777</p>
    </div>

    <button onclick="goBack()">Back to Dashboard</button>

</div>

<script>
function goBack() {
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
