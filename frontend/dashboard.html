<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
      * {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
          font-family: "Inter",'Segoe UI', sans-serif;
      }
      :root{
          --purple: #833ab4;;
          --pink: #fd1d73;
          --orange: #ffc073;
          --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
          --ig-gradient-full:linear-gradient(135deg, #fcb045 0%, #dc2743 40%, #833ab4 80%, #405de6 100%);
      }
      
      body{
          background: linear-gradient(135deg, #1a0a2e 0%, #2d1155 30%, #4a0e2e 60%, #1a0a2e 100%);
          background-attachment: scroll;
          min-height: 100vh;
      }

      #dashboardContent{
        max-width: 1500px;
        margin: 0 auto;
        padding: 9vh ;
      }

      .page-header{
        display: grid;
        place-content: center;
  
      }

      .page-header h1{
        font-size: 2.1rem;
        font-weight: 800;
        letter-spacing: -0.2px;
        color: white;
        margin-top: -.1rem;
        margin-bottom: 0.5rem;
        text-align: center;
      }

      #title {
        font-size: 1.2rem;
        letter-spacing: 2.3px;
        text-transform: uppercase;
        background: var(--ig-gradient-full);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-align: center;
      }

      .page-header p{
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.7);
        text-align: center;
      }


    /*Navigation panel*/
    .nav{
        background: rgba(26, 10, 46, 0.4);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(188, 24, 136, 0.3);
        position: sticky;
        top: 0;
        left: 0;
        right: 0;
        width: 100%;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 9vh;
        padding: 0 2.5rem;
    }

    #teamName{
        font-size: 1.3rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        background: var(--ig-gradient-full);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        
    }

    .nav-links{
        display: flex;
        gap: 2rem;
        list-style-type:none;
    }

    .nav-links a{
        color: rgba(255, 255, 255, 0.75);
        text-decoration: none;
        font-size: 1rem;
        letter-spacing: 0.5px;
        transition: color 0.2s;  
    }

    .nav-links a:hover{
        color: rgb(255,223,158);
    }

    .container { 
      margin-top: 50px;
      padding: 1rem 5rem;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.25rem;
      max-width: 1500px;
    }
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1.2px solid rgba(188, 24, 136, 0.25);
      border-radius: 18px;
      padding: 1.5rem;
      color: white;
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }
    .card p {
        font-size: 1.2rem;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: white;
        line-height: 1;
        margin-top: 0.8rem;
    }

    .card h2{
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: white;
      line-height: 1;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--ig-gradient-full);
      opacity: 0;
      transition: opacity 0.2s;
      }

      .card:hover {
        background: rgba(255, 255, 255, 0.09);
        border-color:  rgba(237, 178, 102, 0.5);
        box-shadow: 0 0 15px rgba(237, 178, 102, 0.2);
        transform: translateY(-3px);
      }

      .card:hover::before {
          opacity: 1;
      }

      #buttons{
        display: flex;
        justify-content: center;
        align-items: center;
      }
  
      button {
      padding: 10px 20px;
      margin-top: 20px;
      margin-left: 8px;
      border: none;
      background: #6a0dad;
      color: white;
      font-size: 1rem;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover { background: var(--ig-gradient-full); }

    #notifications {
      margin-top: 30px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1.2px solid rgba(188, 24, 136, 0.25);
      border-radius: 18px;
      padding: 1.5rem;
      color: white;
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
      padding: 15px;
      width: 50%;
      margin-left: auto;
      margin-right: auto;
    }

    #notifications:hover {
        background: rgba(255, 255, 255, 0.09);
        border-color:  rgba(237, 178, 102, 0.5);
        box-shadow: 0 0 15px rgba(237, 178, 102, 0.2);
        transform: translateY(-3px);
      }
    #notif-title{
      font-size: 1.1rem;
      letter-spacing: 2.3px;
      text-transform: uppercase;
      background: var(--ig-gradient-full);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.1vh;
    }

    .notif-item {
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      font-size: 0.95rem;
    }
    .notif-item:last-child { border-bottom: none; }

    #loading { color: #888; margin-top: 60px; }
  </style>
</head>
<body>

  <nav class = "nav">
  <h1 id = "teamName">CTRL-ALT-DEL</h1>
        <ul class="nav-links">
    <li><a href="/site/about.html">About</a></li>
    <li><a href="/dashboard.html">Dashboard</a></li>
    <li><a href="/rewind.html">InstaRewind</a></li>
    <li><a href="/lookup.html">Lookup</a></li>
    <li><a href="/site/login.html" onclick="sessionStorage.clear()">Logout</a></li>
    <li><a href="https://www.instagram.com/">Instagram</a></li>
  </ul>
        
    </nav>

  
<div id="loading">Loading dashboard...</div>

<div id="dashboardContent" style="display:none">
  <div class = page-header>
    <h3 id = "title">Notification System</h3>
    <h1>Engagement Simulation</h1>
    <p>Notifys when a user follows or unfollows you</p>
  </div>
  

  <div class="container">
    <div class="card">
      <h2>Followers</h2>
      <p id="followers">—</p>
    </div>
    <div class="card">
      <h2>Post Likes</h2>
      <p id="likes">—</p>
    </div>
    <div class="card">
      <h2>Comments</h2>
      <p id="comments">—</p>
    </div>
    <div class="card">
      <h2>Story Likes</h2>
      <p id="storyLikes">—</p>
    </div>
  </div>

  <div id = "buttons">

  <button onclick="simulateActivity()">Run Simulation</button>
  <button id="stopBtn" onclick="stopSimulation()" style="display:none; background-color: #d9534f;">Stop Simulation</button>
  <button onclick="goToRewind()">View Rewind</button>
  </div>

  <div id="notifications">
    <h3 id = "notif-title">Notifications</h3>
    <div id="notifList"><p>No notifications yet.</p></div>
  </div>
</div>

<script>
  // Retrieve the logged-in user from sessionStorage (set by login.html).
  // Falls back to user #1 so the page still works if opened directly.
  const storedUser = JSON.parse(sessionStorage.getItem('user') || 'null');
  const userId = storedUser ? storedUser.id : 1;

  if (storedUser) {
    const el = document.getElementById('welcomeMsg');
    if (el) el.textContent = `Logged in as @${storedUser.username}`;
  }

  let pollInterval = null;
  let simulationTimeout = null;

  async function loadDashboard() {
    try {
      const res  = await fetch(`/api/dashboard/${userId}`);
      const data = await res.json();
      renderDashboard(data);
    } catch (err) {
      document.getElementById('loading').textContent = 'Failed to load dashboard. Is the backend running?';
    }
  }

  function renderDashboard(data) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboardContent').style.display = 'block';

    document.getElementById('followers').textContent  = data.followers;
    document.getElementById('likes').textContent      = data.postLikes;
    document.getElementById('comments').textContent   = data.commentsCount;
    document.getElementById('storyLikes').textContent = data.storyLikes;

    loadNotifications();
  }

  async function loadNotifications() {
    try {
      const res = await fetch(`/api/activity/${userId}`);
      const data = await res.json();
      renderNotifications(Array.isArray(data) ? data : []);
    } catch (err) {
      console.error('Error loading notifications:', err);
    }
  }

  function renderNotifications(notifications) {
    const container = document.getElementById('notifList');
    if (!notifications.length) {
      container.innerHTML = '<p>No notifications yet.</p>';
      return;
    }
    container.innerHTML = notifications
      .map(n => `<div class="notif-item">${n.message}</div>`)
      .join('');
  }

  async function simulateActivity() {
    try {
      document.getElementById('stopBtn').style.display = 'inline-block';
      const res  = await fetch(`/api/simulate/${userId}`, { method: 'POST' });
      const data = await res.json();
      renderDashboard(data);
      
      // Poll for updated notifications every 250ms during simulation
      pollInterval = setInterval(async () => {
        try {
          const dashRes = await fetch(`/api/dashboard/${userId}`);
          const dashData = await dashRes.json();
          renderDashboard(dashData);
        } catch (err) {
          console.error('Error polling dashboard:', err);
        }
      }, 250);
      
      // Stop polling after 260 seconds (500 events * 0.5 seconds + buffer)
      simulationTimeout = setTimeout(() => {
        clearInterval(pollInterval);
        document.getElementById('stopBtn').style.display = 'none';
      }, 260000);
    } catch (err) {
      alert('Simulation failed. Is the backend running?');
    }
  }

  async function stopSimulation() {
    if (pollInterval) clearInterval(pollInterval);
    if (simulationTimeout) clearTimeout(simulationTimeout);
    document.getElementById('stopBtn').style.display = 'none';
    try {
      const dashRes = await fetch(`/api/dashboard/${userId}`);
      const dashData = await dashRes.json();
      renderDashboard(dashData);
    } catch (err) {
      console.error('Error refreshing dashboard after stop:', err);
    }
  }

  function goToRewind() {
    window.location.href = '/rewind.html';
  }

  loadDashboard();
</script>

</body>
</html>
